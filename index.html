<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhra — COD Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --brown: #3d2e23;
    --brown-light: #5a4537;
    --brown-dark: #2a1f17;
    --beige: #faf8f5;
    --beige-mid: #f0ebe3;
    --beige-dark: #d6ccc2;
    --gold: #c9a96e;
    --stage-yellow: #f5a623;
    --stage-green: #27ae60;
    --stage-blue: #2980b9;
    --stage-teal: #16a085;
    --danger: #c0392b;
    --text-primary: #2a1f17;
    --text-secondary: #7a6a5e;
    --text-muted: #a89880;
    --border: #e8e0d5;
    --shadow: 0 2px 12px rgba(61,46,35,0.08);
    --shadow-hover: 0 8px 32px rgba(61,46,35,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--beige); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

  /* ── PIN ── */
  #pin-screen { position: fixed; inset: 0; background: var(--brown-dark); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; gap: 2rem; }
  #pin-screen.hidden { display: none; }
  .pin-logo .brand { font-size: 2rem; font-weight: 300; color: var(--beige); letter-spacing: 0.3em; text-transform: uppercase; text-align: center; }
  .pin-logo .sub { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.25rem; font-family: 'DM Mono', monospace; text-align: center; }
  .pin-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(201,169,110,0.2); border-radius: 16px; padding: 2.5rem 3rem; width: 320px; text-align: center; }
  .pin-label { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.5rem; font-family: 'DM Mono', monospace; }
  .pin-dots { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(201,169,110,0.4); background: transparent; transition: all 0.2s; }
  .pin-dot.filled { background: var(--gold); border-color: var(--gold); }
  .pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; }
  .pin-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--beige); font-family: 'Jost',sans-serif; font-size: 1.2rem; padding: 1rem; cursor: pointer; transition: all 0.15s; }
  .pin-btn:hover { background: rgba(201,169,110,0.15); border-color: rgba(201,169,110,0.4); }
  .pin-btn:active { transform: scale(0.95); }
  .pin-btn.zero { grid-column: 2; }
  .pin-error { color: #e74c3c; font-size: 0.75rem; margin-top: 1rem; font-family: 'DM Mono',monospace; min-height: 1rem; }

  /* ── HEADER ── */
  header { background: var(--brown); padding: 0 1.25rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
  .header-brand { font-size: 0.95rem; font-weight: 300; color: var(--beige); letter-spacing: 0.2em; text-transform: uppercase; }
  .header-brand span { color: var(--gold); font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; }
  .header-role { font-family: 'DM Mono',monospace; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; background: rgba(201,169,110,0.15); padding: 0.25rem 0.6rem; border-radius: 20px; border: 1px solid rgba(201,169,110,0.3); }
  .btn-refresh { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--beige); padding: 0.35rem 0.75rem; border-radius: 8px; font-family: 'Jost',sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.35rem; }
  .btn-refresh.spinning .ri { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-logout { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.7rem; font-family: 'DM Mono',monospace; }
  .btn-logout:hover { color: var(--beige); }

  /* ── STATS ── */
  .stats-bar { background: var(--brown-dark); padding: 0.75rem 1.25rem; display: flex; gap: 1.25rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-item { display: flex; flex-direction: column; gap: 0.15rem; white-space: nowrap; }
  .stat-label { font-family: 'DM Mono',monospace; font-size: 0.55rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-value { font-size: 1.1rem; font-weight: 500; color: var(--beige); }
  .stat-value.yellow { color: var(--stage-yellow); }
  .stat-value.green  { color: var(--stage-green); }
  .stat-value.blue   { color: var(--stage-blue); }
  .stat-value.teal   { color: var(--stage-teal); }
  .stat-divider { width: 1px; background: rgba(255,255,255,0.08); align-self: stretch; flex-shrink: 0; }

  /* ── MOBILE TABS ── */
  .tab-bar { display: none; background: var(--brown); border-bottom: 1px solid rgba(255,255,255,0.08); overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.75rem 1rem; font-family: 'Jost',sans-serif; font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,0.5); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { color: var(--beige); border-bottom-color: var(--gold); }
  .tab-btn .tab-count { font-family: 'DM Mono',monospace; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 10px; background: rgba(255,255,255,0.1); }
  .tab-btn.active .tab-count { background: rgba(201,169,110,0.25); color: var(--gold); }

  /* ── PIPELINE — DESKTOP ── */
  .pipeline { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; padding: 1.25rem 1.5rem 3rem; align-items: start; }

  /* ── COLUMN ── */
  .col { display: flex; flex-direction: column; gap: 0.875rem; }
  .col-header { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 0.875rem; border-radius: 10px; position: sticky; top: 68px; z-index: 10; }
  .col-header.yellow { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.25); }
  .col-header.green  { background: rgba(39,174,96,0.12);  border: 1px solid rgba(39,174,96,0.25); }
  .col-header.blue   { background: rgba(41,128,185,0.12); border: 1px solid rgba(41,128,185,0.25); }
  .col-header.teal   { background: rgba(22,160,133,0.12); border: 1px solid rgba(22,160,133,0.25); }
  .col-title { display: flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; }
  .col-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .yellow .col-dot { background: var(--stage-yellow); }
  .green  .col-dot { background: var(--stage-green); }
  .blue   .col-dot { background: var(--stage-blue); }
  .teal   .col-dot { background: var(--stage-teal); }
  .col-count { font-family: 'DM Mono',monospace; font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 20px; }
  .yellow .col-count { background: rgba(245,166,35,0.2); color: var(--stage-yellow); }
  .green  .col-count { background: rgba(39,174,96,0.2);  color: var(--stage-green); }
  .blue   .col-count { background: rgba(41,128,185,0.2); color: var(--stage-blue); }
  .teal   .col-count { background: rgba(22,160,133,0.2); color: var(--stage-teal); }

  /* ── CARD ── */
  .order-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 0.9rem 1rem; box-shadow: var(--shadow); transition: box-shadow 0.2s, transform 0.2s; animation: cardIn 0.3s ease; }
  @keyframes cardIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .order-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .order-card.urgent { border-left: 3px solid var(--danger); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem; gap: 0.5rem; }
  .order-num { font-family: 'DM Mono',monospace; font-size: 0.7rem; color: var(--gold); }
  .customer-name { font-size: 0.875rem; font-weight: 500; color: var(--text-primary); }
  .countdown { font-family: 'DM Mono',monospace; font-size: 0.62rem; padding: 0.18rem 0.45rem; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
  .countdown.safe   { background: #eafaf1; color: #27ae60; }
  .countdown.warn   { background: #fef9e7; color: #f39c12; }
  .countdown.danger { background: #fdedec; color: #c0392b; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.55} }
  .order-meta { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 0.6rem; flex-wrap: wrap; }
  .order-price { font-family: 'DM Mono',monospace; font-size: 0.78rem; color: var(--brown); }
  .order-date  { font-size: 0.68rem; color: var(--text-muted); font-family: 'DM Mono',monospace; }
  .order-items { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 0.6rem; line-height: 1.5; }
  .order-note  { font-size: 0.68rem; color: var(--text-muted); background: var(--beige-mid); border-radius: 6px; padding: 0.35rem 0.55rem; margin-bottom: 0.6rem; font-style: italic; border-left: 2px solid var(--beige-dark); }
  .card-actions { display: flex; flex-direction: column; gap: 0.45rem; }
  .btn-action { width: 100%; padding: 0.5rem 0.7rem; border-radius: 8px; border: none; font-family: 'Jost',sans-serif; font-size: 0.73rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.35rem; }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-confirm { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
  .btn-confirm:hover:not(:disabled) { background: #27ae60; color: #fff; }
  .btn-ship    { background: #eaf2fb; color: #1a5276; border: 1px solid #a9cce3; }
  .btn-ship:hover:not(:disabled)    { background: #2980b9; color: #fff; }
  .btn-collect { background: #e8f8f5; color: #0e6655; border: 1px solid #a2d9ce; }
  .btn-collect:hover:not(:disabled) { background: #16a085; color: #fff; }
  .btn-cancel  { background: #fdedec; color: #922b21; border: 1px solid #f1948a; }
  .btn-cancel:hover:not(:disabled)  { background: #c0392b; color: #fff; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-size: 0.68rem; }
  .btn-secondary:hover { background: var(--beige-mid); }
  .btn-row { display: flex; gap: 0.4rem; }
  .btn-row .btn-action { flex: 1; }

  /* ── NOTE ── */
  .note-area { display: none; flex-direction: column; gap: 0.35rem; margin-bottom: 0.4rem; }
  .note-area.open { display: flex; }
  .note-input { width: 100%; padding: 0.45rem 0.55rem; border: 1px solid var(--border); border-radius: 6px; font-family: 'Jost',sans-serif; font-size: 0.73rem; color: var(--text-primary); background: var(--beige-mid); resize: none; outline: none; transition: border-color 0.2s; }
  .note-input:focus { border-color: var(--gold); }
  .note-save { align-self: flex-end; padding: 0.3rem 0.75rem; background: var(--brown); color: var(--beige); border: none; border-radius: 6px; font-family: 'Jost',sans-serif; font-size: 0.68rem; cursor: pointer; }
  .note-save:hover { background: var(--gold); color: var(--brown); }

  /* ── EMPTY / LOADING ── */
  .empty-col { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.72rem; font-family: 'DM Mono',monospace; }
  .empty-icon { font-size: 1.4rem; margin-bottom: 0.4rem; opacity: 0.35; }
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; color: var(--text-muted); gap: 1rem; grid-column: 1/-1; }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(42,31,23,0.6); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 1.75rem; width: 400px; max-width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.2); animation: modalIn 0.22s ease; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
  .modal-desc  { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 1.25rem; line-height: 1.6; }
  .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
  .modal-btn { padding: 0.55rem 1.1rem; border-radius: 8px; border: none; font-family: 'Jost',sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .modal-btn.cancel  { background: var(--beige-mid); color: var(--text-secondary); }
  .modal-btn.cancel:hover  { background: var(--border); }
  .modal-btn.confirm { background: var(--brown); color: #fff; }
  .modal-btn.confirm:hover { background: var(--gold); color: var(--brown); }
  .modal-btn.danger  { background: var(--danger); color: #fff; }
  .modal-btn.danger:hover  { background: #a93226; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 0.4rem; z-index: 900; }
  .toast { background: var(--brown); color: var(--beige); padding: 0.65rem 1.1rem; border-radius: 10px; font-size: 0.78rem; font-family: 'Jost',sans-serif; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: toastIn 0.25s ease; display: flex; align-items: center; gap: 0.45rem; max-width: 300px; }
  .toast.success { border-left: 3px solid var(--stage-green); }
  .toast.error   { border-left: 3px solid var(--danger); }
  .toast.info    { border-left: 3px solid var(--gold); }
  @keyframes toastIn { from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)} }

  .view-only-bar { background: rgba(201,169,110,0.1); border-bottom: 1px solid rgba(201,169,110,0.2); padding: 0.4rem 1.25rem; font-size: 0.68rem; color: var(--gold); font-family: 'DM Mono',monospace; letter-spacing: 0.07em; text-align: center; display: none; }
  .view-only-bar.visible { display: block; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--beige-dark); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .tab-bar { display: block; }
    .pipeline { grid-template-columns: 1fr; padding: 1rem; gap: 0.875rem; }
    .col { display: none; }
    .col.active { display: flex; }
    .col-header { position: static; }
  }
  @media (min-width: 901px) {
    .pipeline { grid-template-columns: repeat(4,1fr); }
    .col { display: flex !important; }
  }
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-logo">
    <div class="brand">Muhra</div>
    <div class="sub">COD Control Dashboard</div>
  </div>
  <div class="pin-box">
    <div class="pin-label">Enter PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn zero" onclick="pinPress('0')">0</button>
      <button class="pin-btn" onclick="pinDelete()">⌫</button>

    <div class="pin-error" id="pin-error"></div>

</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="header-brand">Muhra <span>/ COD</span></div>
    <div class="header-right">
      <div class="header-role" id="role-badge">——</div>
      <button class="btn-refresh" id="refresh-btn" onclick="loadAll()"><span class="ri">↻</span> Refresh</button>
      <button class="btn-logout" onclick="logout()">Lock</button>
    </div>
  </header>

  <div class="view-only-bar" id="view-only-bar">👁 View-only — Contact Asmaa to make changes</div>

  <div class="stats-bar">
    <div class="stat-item"><span class="stat-label">Total</span><span class="stat-value" id="stat-total">—</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">Awaiting</span><span class="stat-value yellow" id="stat-s1">—</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">Confirmed</span><span class="stat-value green" id="stat-s2">—</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">Delivery</span><span class="stat-value blue" id="stat-s3">—</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">Collected</span><span class="stat-value teal" id="stat-s4">—</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">Value</span><span class="stat-value" id="stat-value">—</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">Expiring</span><span class="stat-value" id="stat-expiring" style="color:var(--danger)">—</span></div>
  </div>

  <!-- MOBILE TAB BAR -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('awaiting_deposit')" id="tab-awaiting_deposit">
      🟡 Awaiting <span class="tab-count" id="tc-awaiting_deposit">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('confirmed')" id="tab-confirmed">
      🟢 Confirmed <span class="tab-count" id="tc-confirmed">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('in_delivery')" id="tab-in_delivery">
      🚚 Delivery <span class="tab-count" id="tc-in_delivery">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('collected')" id="tab-collected">
      ✅ Collected <span class="tab-count" id="tc-collected">0</span>
    </button>
  </div>

  <div class="pipeline" id="pipeline">
    <div class="loading-state">
      <div class="spinner"></div>
      <span style="font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.05em">Loading orders...</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-desc"  id="modal-desc"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel"  onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" id="modal-confirm-btn" onclick="modalConfirm()">Confirm</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const PROXY  = 'https://ltwzmjqrlvqbndmipufm.supabase.co/functions/v1/shopify-proxy';
const SB_URL = 'https://ltwzmjqrlvqbndmipufm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0d3ptanFybHZxYm5kbWlwdWZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDA3NTEsImV4cCI6MjA5MjY3Njc1MX0.pvp5NFr2tOTw_MJHIxHO9kK7cQ75QjL5N8AcewXIVOM';
const PINS   = { '0000':'operator', '1111':'viewer' };

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let currentRole   = null;
let pendingAction = null;
let pinBuffer     = '';
let activeTab     = 'awaiting_deposit';

// ─────────────────────────────────────────
// PIN
// ─────────────────────────────────────────
function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d; updateDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}
function pinDelete() { pinBuffer = pinBuffer.slice(0,-1); updateDots(); }
function updateDots() {
  for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i<pinBuffer.length);
}
function checkPin() {
  const p = pinBuffer; pinBuffer = ''; updateDots();
  const role = PINS[p];
  if (role) { currentRole = role; enterApp(); }
  else { document.getElementById('pin-error').textContent='Incorrect PIN'; setTimeout(()=>document.getElementById('pin-error').textContent='',2000); }
}
function enterApp() {
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('role-badge').textContent = currentRole==='operator' ? '⚙ Operator' : '👁 Viewer';
  if (currentRole==='viewer') document.getElementById('view-only-bar').classList.add('visible');
  loadAll();
}
function logout() {
  currentRole = null; pinBuffer = ''; updateDots();
  document.getElementById('pin-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('view-only-bar').classList.remove('visible');
}

// ─────────────────────────────────────────
// MOBILE TABS
// ─────────────────────────────────────────
function switchTab(stage) {
  activeTab = stage;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+stage).classList.add('active');
  document.querySelectorAll('.col').forEach(c => c.classList.remove('active'));
  const col = document.getElementById('col-'+stage);
  if (col) col.classList.add('active');
}

// ─────────────────────────────────────────
// SHOPIFY via PROXY
// ─────────────────────────────────────────
async function shopifyFetch(path, method='GET', bodyObj=null) {
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY
    },
    body: JSON.stringify({
      path,
      method,
      body: bodyObj   // proxy extracts and forwards this to Shopify
    })
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Shopify ${res.status}: ${txt}`);
  }
  return res.json();
}

async function getOrders() {
  const [r1, r2] = await Promise.all([
    shopifyFetch('orders.json?financial_status=pending&status=open&limit=250'),
    shopifyFetch('orders.json?fulfillment_status=fulfilled&financial_status=pending&status=open&limit=50')
  ]);
  const all = [...(r1.orders||[]), ...(r2.orders||[])];
  const seen = new Set();
  return all.filter(o => { if(seen.has(o.id)) return false; seen.add(o.id); return true; });
}

async function cancelShopifyOrder(orderId) {
  return shopifyFetch(`orders/${orderId}/cancel.json`, 'POST', { reason:'customer', restock:true });
}

async function addOrderNote(orderId, note) {
  return shopifyFetch(`orders/${orderId}.json`, 'PUT', { order:{ id: Number(orderId), note } });
}

async function markOrderPaid(orderId) {
  return shopifyFetch(`orders/${orderId}/transactions.json`, 'POST', {
    transaction: { kind:'capture', status:'success' }
  });
}

// ─────────────────────────────────────────
// SUPABASE
// ─────────────────────────────────────────
async function sbFetch(path, method='GET', body=null) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : null
  });
  if (res.status===204 || method==='DELETE') return {};
  return res.json();
}

async function getPipelineRecords() { return sbFetch('cod_pipeline?select=*'); }

async function updateRecord(sid, data) {
  return sbFetch(`cod_pipeline?shopify_order_id=eq.${sid}`, 'PATCH', { ...data, updated_at: new Date().toISOString() });
}

async function insertRecord(data) { return sbFetch('cod_pipeline', 'POST', data); }

// ─────────────────────────────────────────
// LOAD & MERGE
// ─────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const [orders, sbRecs] = await Promise.all([getOrders(), getPipelineRecords()]);
    const sbMap = {};
    if (Array.isArray(sbRecs)) sbRecs.forEach(r => sbMap[r.shopify_order_id] = r);

    const merged = [];
    for (const order of orders) {
      const sid = String(order.id);
      let rec = sbMap[sid];
      if (!rec) {
        const newRec = {
          shopify_order_id: sid,
          order_number: `#${order.order_number || order.name}`,
          customer_name: (() => {
            const b = order.billing_address, c = order.customer;
            if (b) return `${b.first_name||''} ${b.last_name||''}`.trim();
            if (c) return `${c.first_name||''} ${c.last_name||''}`.trim();
            return 'Unknown';
          })(),
          total_price: parseFloat(order.total_price||0),
          created_at_shopify: order.created_at,
          stage: order.fulfillment_status==='fulfilled' ? 'in_delivery' : 'awaiting_deposit'
        };
        try { const ins = await insertRecord(newRec); rec = Array.isArray(ins)?ins[0]:newRec; }
        catch(e) { rec = newRec; }
      }
      // Auto-advance if Shopify shows fulfilled but we still show confirmed
      if (order.fulfillment_status==='fulfilled' && rec.stage==='confirmed') {
        await updateRecord(sid, { stage:'in_delivery', shipped_at: new Date().toISOString() });
        rec = { ...rec, stage:'in_delivery' };
      }
      merged.push({ order, rec });
    }

    // Include in_delivery / collected records whose Shopify orders may be closed
    if (Array.isArray(sbRecs)) {
      const shopifyIds = new Set(orders.map(o=>String(o.id)));
      sbRecs.forEach(rec => {
        if (!shopifyIds.has(rec.shopify_order_id) && (rec.stage==='in_delivery'||rec.stage==='collected'))
          merged.push({ order:null, rec });
      });
    }

    renderPipeline(merged);
    updateStats(merged);
  } catch(e) {
    console.error(e);
    showToast('Failed to load: '+e.message, 'error');
    renderError();
  }
  btn.classList.remove('spinning');
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
const STAGE_META = {
  awaiting_deposit: { label:'Awaiting Deposit', color:'yellow' },
  confirmed:        { label:'Confirmed',         color:'green'  },
  in_delivery:      { label:'In Delivery',       color:'blue'   },
  collected:        { label:'Collected',         color:'teal'   }
};

function renderPipeline(merged) {
  const stages = { awaiting_deposit:[], confirmed:[], in_delivery:[], collected:[] };
  merged.forEach(item => { const s=item.rec.stage||'awaiting_deposit'; if(stages[s]) stages[s].push(item); });
  const isOp = currentRole==='operator';

  let html = '';
  for (const [stage, meta] of Object.entries(STAGE_META)) {
    const items = stages[stage];
    const isActive = stage===activeTab ? ' active' : '';
    const cards = items.length
      ? items.map(({order,rec})=>renderCard(stage,order,rec,isOp)).join('')
      : `<div class="empty-col"><div class="empty-icon">○</div>No orders</div>`;
    html += `<div class="col${isActive}" id="col-${stage}">
      <div class="col-header ${meta.color}">
        <div class="col-title"><div class="col-dot"></div>${meta.label}</div>
        <div class="col-count">${items.length}</div>
      </div>${cards}</div>`;
  }
  document.getElementById('pipeline').innerHTML = html;
}

function renderCard(stage, order, rec, isOp) {
  const sid   = rec.shopify_order_id;
  const num   = rec.order_number || (order?`#${order.name}`:'—');
  const name  = rec.customer_name || 'Unknown';
  const price = parseFloat(rec.total_price||(order?order.total_price:0)||0);
  const created = new Date(rec.created_at_shopify||(order?order.created_at:Date.now()));
  const daysOld = Math.floor((Date.now()-created)/86400000);
  const daysLeft = 7-daysOld;
  const items = order
    ? (order.line_items||[]).slice(0,2).map(i=>`${i.name} ×${i.quantity}`).join(', ')
      + ((order.line_items||[]).length>2?` +${order.line_items.length-2} more`:'')
    : '';
  const note  = rec.notes||(order?order.note:'')||'';
  const phone = order?(order.billing_address?.phone||order.shipping_address?.phone||''):'';
  const isUrgent = stage==='awaiting_deposit' && daysLeft<=1;

  let countdown='';
  if (stage==='awaiting_deposit') {
    const cls = daysLeft<=0?'danger':daysLeft<=2?'warn':'safe';
    const lbl = daysLeft<=0?'EXPIRED':daysLeft===1?'1d left':`${daysLeft}d left`;
    countdown = `<span class="countdown ${cls}">${lbl}</span>`;
  }

  // Escape for inline onclick attrs
  const esc = s => s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  let actions='';
  if (isOp) {
    if (stage==='awaiting_deposit') {
      actions=`
        <button class="btn-action btn-confirm" onclick="confirmDeposit('${esc(sid)}','${esc(num)}','${esc(name)}')">✓ Deposit Received</button>
        <div class="note-area" id="note-${sid}">
          <textarea class="note-input" id="ni-${sid}" rows="2" placeholder="Add note to Shopify order..."></textarea>
          <button class="note-save" onclick="saveNote('${esc(sid)}')">Save Note</button>
        </div>
        <div class="btn-row">
          <button class="btn-action btn-secondary" onclick="toggleNote('${esc(sid)}')">📝 Note</button>
          <button class="btn-action btn-cancel" onclick="cancelOrder('${esc(sid)}','${esc(num)}','${esc(name)}')">✕ Cancel</button>
        </div>`;
    } else if (stage==='confirmed') {
      actions=`
        <button class="btn-action btn-ship" onclick="markShipped('${esc(sid)}','${esc(num)}','${esc(name)}')">🚚 Handed to Wijha</button>
        <div class="note-area" id="note-${sid}">
          <textarea class="note-input" id="ni-${sid}" rows="2" placeholder="Add note..."></textarea>
          <button class="note-save" onclick="saveNote('${esc(sid)}')">Save Note</button>
        </div>
        <button class="btn-action btn-secondary" onclick="toggleNote('${esc(sid)}')">📝 Note</button>`;
    } else if (stage==='in_delivery') {
      actions=`
        <button class="btn-action btn-collect" onclick="markCollected('${esc(sid)}','${esc(num)}','${esc(name)}',${price})">💰 Mark Collected</button>
        <div class="note-area" id="note-${sid}">
          <textarea class="note-input" id="ni-${sid}" rows="2" placeholder="Add note..."></textarea>
          <button class="note-save" onclick="saveNote('${esc(sid)}')">Save Note</button>
        </div>
        <button class="btn-action btn-secondary" onclick="toggleNote('${esc(sid)}')">📝 Note</button>`;
    } else if (stage==='collected') {
      actions=`<div style="font-size:0.68rem;color:var(--stage-teal);font-family:'DM Mono',monospace;text-align:center;padding:0.2rem">✓ Archived as Paid on Shopify</div>`;
    }
  }

  return `<div class="order-card${isUrgent?' urgent':''}" id="card-${sid}">
    <div class="card-top">
      <div><div class="order-num">${num}</div><div class="customer-name">${name}</div></div>
      ${countdown}
    </div>
    <div class="order-meta">
      <span class="order-price">EGP ${price.toLocaleString('en-EG',{minimumFractionDigits:2})}</span>
      <span class="order-date">${fmtDate(created)}</span>
    </div>
    ${items?`<div class="order-items">${items}</div>`:''}
    ${phone?`<div class="order-date" style="margin-bottom:0.5rem">📱 ${phone}</div>`:''}
    ${note?`<div class="order-note">${note}</div>`:''}
    ${actions?`<div class="card-actions">${actions}</div>`:''}
  </div>`;
}

function updateStats(merged) {
  const c={awaiting_deposit:0,confirmed:0,in_delivery:0,collected:0};
  let val=0,exp=0;
  merged.forEach(({order,rec})=>{
    const s=rec.stage||'awaiting_deposit';
    if(c[s]!==undefined) c[s]++;
    val+=parseFloat(rec.total_price||(order?order.total_price:0)||0);
    if(s==='awaiting_deposit'){
      const d=Math.floor((Date.now()-new Date(rec.created_at_shopify||(order?order.created_at:Date.now())))/86400000);
      if(d>=6) exp++;
    }
    // Update tab counts
    const tc = document.getElementById('tc-'+s);
    if(tc) tc.textContent = c[s];
  });
  // Set tab counts final
  ['awaiting_deposit','confirmed','in_delivery','collected'].forEach(s=>{
    const tc=document.getElementById('tc-'+s); if(tc) tc.textContent=c[s];
  });
  document.getElementById('stat-total').textContent=merged.length;
  document.getElementById('stat-s1').textContent=c.awaiting_deposit;
  document.getElementById('stat-s2').textContent=c.confirmed;
  document.getElementById('stat-s3').textContent=c.in_delivery;
  document.getElementById('stat-s4').textContent=c.collected;
  document.getElementById('stat-value').textContent='EGP '+val.toLocaleString('en-EG',{maximumFractionDigits:0});
  document.getElementById('stat-expiring').textContent=exp;
}

function renderError() {
  document.getElementById('pipeline').innerHTML=`<div class="loading-state" style="grid-column:1/-1">
    <div style="font-size:2rem">⚠</div>
    <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--danger)">Failed to load. Check console.</span>
  </div>`;
}

// ─────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────
function confirmDeposit(sid,num,name) {
  showModal('Confirm Deposit Received',
    `Mark deposit received for <strong>${name}</strong> (${num})?<br>Order moves to Confirmed and a note is added on Shopify.`,
    'confirm', async()=>{
      try {
        await updateRecord(sid,{stage:'confirmed',deposit_confirmed_at:new Date().toISOString(),deposit_confirmed_by:'Asmaa'});
        await addOrderNote(sid,`✅ Deposit confirmed by Asmaa on ${fmtDate(new Date())}. Order ready to ship.`);
        showToast(`${num} — Deposit confirmed ✓`,'success');
        loadAll();
      } catch(e){ showToast('Error: '+e.message,'error'); }
    });
}

function markShipped(sid,num,name) {
  showModal('Handed to Wijha',
    `Confirm <strong>${name}</strong>'s order (${num}) handed to Wijha courier?`,
    'confirm', async()=>{
      try {
        await updateRecord(sid,{stage:'in_delivery',shipped_at:new Date().toISOString()});
        await addOrderNote(sid,`🚚 Handed to Wijha on ${fmtDate(new Date())}.`);
        showToast(`${num} — In Delivery ✓`,'success');
        loadAll();
      } catch(e){ showToast('Error: '+e.message,'error'); }
    });
}

function markCollected(sid,num,name,price) {
  showModal('Mark Collected & Paid',
    `Confirm <strong>${name}</strong>'s order (${num}) — EGP ${price.toLocaleString()} collected?<br>Archives order as Paid on Shopify.`,
    'confirm', async()=>{
      try {
        await updateRecord(sid,{stage:'collected',collected_at:new Date().toISOString()});
        try { await markOrderPaid(sid); } catch(e){ console.warn('Transaction:',e.message); }
        await addOrderNote(sid,`💰 COD collected on ${fmtDate(new Date())}. Archived.`);
        showToast(`${num} — Collected ✓`,'success');
        loadAll();
      } catch(e){ showToast('Error: '+e.message,'error'); }
    });
}

function cancelOrder(sid,num,name) {
  showModal('Cancel Order',
    `Cancel <strong>${name}</strong>'s order (${num})?<br>Inventory will be restocked. <strong>Cannot be undone.</strong>`,
    'danger', async()=>{
      try {
        await cancelShopifyOrder(sid);
        await updateRecord(sid,{stage:'cancelled',cancelled_at:new Date().toISOString()});
        showToast(`${num} — Cancelled & restocked ✓`,'info');
        loadAll();
      } catch(e){ showToast('Error: '+e.message,'error'); }
    });
}

function toggleNote(sid) {
  const el=document.getElementById('note-'+sid);
  el.classList.toggle('open');
  if(el.classList.contains('open')) document.getElementById('ni-'+sid).focus();
}

async function saveNote(sid) {
  const inp=document.getElementById('ni-'+sid);
  const note=inp.value.trim();
  if(!note) return;
  try {
    await updateRecord(sid,{notes:note});
    await addOrderNote(sid,note);
    showToast('Note saved ✓','success');
    document.getElementById('note-'+sid).classList.remove('open');
    inp.value='';
    loadAll();
  } catch(e){ showToast('Error saving: '+e.message,'error'); }
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
function showModal(title,desc,type,onConfirm) {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-desc').innerHTML=desc;
  const btn=document.getElementById('modal-confirm-btn');
  btn.className=`modal-btn ${type}`;
  btn.textContent=type==='danger'?'Yes, Cancel Order':'Confirm';
  pendingAction=onConfirm;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); pendingAction=null; }
function modalConfirm(){ closeModal(); if(pendingAction) pendingAction(); }
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
function showToast(msg,type='info') {
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${{success:'✓',error:'✕',info:'ℹ'}[type]}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}
function fmtDate(d){ return new Date(d).toLocaleDateString('en-EG',{day:'numeric',month:'short',year:'numeric'}); }

// Auto-refresh every 3 min
setInterval(()=>{ if(currentRole) loadAll(); }, 180000);
</script>
